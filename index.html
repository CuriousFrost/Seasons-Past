<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#09090b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Seasons Past" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Seasons Past - EDH Game Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mana-font@latest/css/mana.min.css" />
    <!-- Apply saved theme before first paint to prevent flash -->
    <script>
      (function(){
        var t = localStorage.getItem('seasons-past-theme') || 'default-dark';
        var dark = ['default-dark','cerulean-sand','ember-violet','lagoon-royal',
          'crimson-noir','mosswood','ultramarine-pop','rose-plum','sunburst-red'];
        document.documentElement.dataset.theme = t;
        if (dark.indexOf(t) !== -1) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
